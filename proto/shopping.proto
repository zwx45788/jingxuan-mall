syntax = "proto3";

package com.example.shopping;
option java_package = "com.example.shopping.api";
option go_package = "shopping/api/shopping";

service UserService{
    rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
    rpc LoginUser(LoginUserRequest) returns (LoginUserResponse);
    rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);
    rpc ListAddresses(ListAddressesRequest) returns (ListAddressesResponse);
    rpc UpdateAddress(UpdateAddressRequest) returns (UpdateAddressResponse);
    rpc UpdateUserInfo(UpdateUserInfoRequest) returns (UpdateUserInfoResponse);
}

service MerchantService{
    rpc RegisterMerchant(RegisterMerchantRequest) returns (RegisterMerchantResponse);
    rpc LoginMerchant(LoginMerchantRequest) returns (LoginMerchantResponse);
    rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
    rpc PublishProduct(PublishProductRequest) returns (PublishProductResponse);
    rpc UnPublishProduct(UnPublishProductRequest) returns (UnPublishProductResponse);
    rpc CreateShop(CreateShopRequest) returns (CreateShopResponse);
    rpc GetMerchantInfo(GetMerchantInfoRequest) returns (GetMerchantInfoResponse);
}

service CartService{
    rpc GetCartInfo(GetCartInfoRequest) returns (GetCartInfoResponse);
    rpc AddToCart(AddToCartRequest) returns (AddToCartResponse);
    rpc RemoveFromCart(RemoveFromCartRequest) returns (RemoveFromCartResponse);
}
//order service
service OrderService{
    rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
}

//user service

message AddressInfo{
    uint64 address_id = 1;
    string receiver_name = 2;
    string phone_number = 3;
    string address = 4;
}

message ListAddressesRequest{
    uint64 user_id = 1;
}

message ListAddressesResponse{
    bool success = 1;
    string message = 2;
    repeated AddressInfo addresses = 3;
}



message UpdateAddressRequest{
    uint64 user_id = 1;
    uint64 address_id = 2;
    AddressInfo address_info = 3;
}

message UpdateAddressResponse{
    bool success = 1;
    string message = 2;
}

message GetUserInfoRequest{
    uint64 user_id = 1;
}

message GetUserInfoResponse{
    bool success = 1;
    string message = 2;
    User user = 3;
}

message UpdateUserInfoRequest{
    uint64 user_id = 1;
    string username = 2;
    string email = 3;
}

message UpdateUserInfoResponse{
    bool success = 1;
    string message = 2;
}

message User{
    uint64 user_id = 1;
    string username = 2;
    string email = 3;
}
message RegisterUserRequest{
    string username = 1;
    string password = 2;
    string email = 3;
}

message RegisterUserResponse{
    bool success = 1;
    string message = 2;
}

message LoginUserRequest{
    string email = 1;
    string password = 2;
}

message LoginUserResponse{
    bool success = 1;
    string token = 2;
    string message = 3;
}
message GetCartInfoRequest{
    uint64 user_id = 1;
}

message GetCartInfoResponse{
    bool success = 1;
    string message = 2;
    repeated CartItem cart_items = 3;
}

message CartItem{
    string title = 1;
    string image = 2;
    string spec_json = 3;
    uint64 price = 4;
    uint64 quantity = 5;
    uint64 checked = 6;
    uint64 shop_id = 7;
}
message AddToCartRequest{
    uint64 user_id = 1;
    uint64 sku_id = 2;
    uint64 quantity = 3;
}

message AddToCartResponse{
    bool success = 1;
    string message = 2;
}

message RemoveFromCartRequest{
    uint64 user_id = 1;
    uint64 cart_item_id = 2;
}

message RemoveFromCartResponse{
    bool success = 1;
    string message = 2;
}

//merchant service

message RegisterMerchantRequest{
    string username = 1;
    string password = 2;
    string email = 3;
}

message RegisterMerchantResponse{
    bool success = 1;
    string message = 2;
}

message LoginMerchantRequest{
    string email = 1;
    string password = 2;
}

message LoginMerchantResponse{
    bool success = 1;
    string token = 2;
    string message = 3;
}


message CreateProductRequest{
    uint64 category_id = 1;
    string title = 2;
    string main_image = 3;
    uint64 total_stock = 4;
    uint64 status = 5;
    repeated Sku skus = 6;
}

message CreateProductResponse{
    bool success = 1;
    string message = 2;
}

message Sku{
    string spec_json = 1;
    uint64 price = 2;
    uint64 stock = 3;
    string image = 4;
}

message PublishProductRequest{
    repeated uint64 product_ids = 1;
}

message PublishProductResponse{
    bool success = 1;
    string message = 2;
}

message UnPublishProductRequest{
    repeated uint64 product_ids = 1;
}

message UnPublishProductResponse{
    bool success = 1;
    string message = 2;
}

message CreateShopRequest{
    uint64 merchant_id = 1;
    string shop_name = 2;
    string description = 3;
    string logo = 4;
}

message CreateShopResponse{
    bool success = 1;
    string message = 2;
}

message CreateOrderRequest{
    uint64 user_id = 1;
    uint64 sku_id = 2;
    uint64 quantity = 3;
}

message CreateOrderResponse{
    bool success = 1;
    string message = 2;
}

message GetMerchantInfoRequest{
    uint64 merchant_id = 1;
}

message GetMerchantInfoResponse{
    bool success = 1;
    string message = 2;
    string name = 3;
    string email = 4;
}